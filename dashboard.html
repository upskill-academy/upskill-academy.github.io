<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Course Dashboard — AI Engineer & FDE Bootcamp</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f4c81'/><text x='50' y='70' font-size='55' text-anchor='middle'>🎓</text></svg>">
<style>
:root{--bg:#fdfdfc;--surface:#f4f4f1;--text:#1c1e21;--muted:#5c6470;--accent:#0f4c81;
--accent-soft:#e8eef5;--border:#e3e3de;color-scheme:light dark}
@media (prefers-color-scheme:dark){:root{--bg:#14161a;--surface:#1c1f24;--text:#e8eaed;
--muted:#9aa3af;--accent:#7ab3e0;--accent-soft:#1e2c3a;--border:#2a2e34}}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:16px/1.65 -apple-system,BlinkMacSystemFont,
"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:52rem;margin:0 auto;padding:0 1.25rem}
a{color:var(--accent)}
header.site{padding:2.2rem 0 1.6rem;border-bottom:1px solid var(--border)}
header.site .kicker{color:var(--accent);font-size:.8rem;font-weight:600;letter-spacing:.12em;
text-transform:uppercase;margin-bottom:.4rem}
header.site h1{font-size:1.7rem;line-height:1.2;letter-spacing:-.01em}
header.site p{color:var(--muted);margin-top:.5rem}
nav.toc{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);
padding:.6rem 0;z-index:5}
nav.toc .wrap{display:flex;flex-wrap:wrap;gap:.45rem}
nav.toc a{font-size:.85rem;font-weight:500;text-decoration:none;color:var(--text);
padding:.3rem .8rem;border:1px solid var(--border);border-radius:999px}
nav.toc a:hover{border-color:var(--accent);background:var(--accent-soft)}
section.doc{padding:2.4rem 0;border-bottom:1px solid var(--border)}
.md h1{font-size:1.7rem;margin:0 0 1rem;letter-spacing:-.01em}
.md h2{font-size:1.25rem;margin:1.8rem 0 .7rem}
.md h3{font-size:1.05rem;margin:1.4rem 0 .5rem}
.md p{margin:.7rem 0}
.md ul,.md ol{margin:.7rem 0 .7rem 1.4rem}
.md li{margin:.25rem 0}
.md blockquote{border-left:3px solid var(--accent);background:var(--surface);
padding:.6rem 1rem;margin:1rem 0;color:var(--muted);border-radius:0 8px 8px 0}
.md code{font-family:Menlo,Consolas,monospace;font-size:.86em;background:var(--surface);
border:1px solid var(--border);border-radius:5px;padding:.1em .35em}
.md pre{background:var(--surface);border:1px solid var(--border);border-radius:10px;
padding:.9rem 1.1rem;overflow-x:auto;margin:1rem 0}
.md pre code{border:none;background:none;padding:0}
.md table{border-collapse:collapse;width:100%;margin:1rem 0;font-size:.92rem;display:block;
overflow-x:auto}
.md th,.md td{border:1px solid var(--border);padding:.45rem .7rem;text-align:left;
vertical-align:top}
.md th{background:var(--surface)}
footer.site{padding:2rem 0 3rem;color:var(--muted);font-size:.85rem}
.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;
font-weight:600;padding:.65rem 1.4rem;border-radius:999px;border:none;font-size:1rem;
cursor:pointer}
.btn:hover{opacity:.9}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
padding:1.6rem;margin:1.4rem 0}
#lock{max-width:26rem;margin:14vh auto 0;text-align:center;padding:0 1.25rem}
#lock input{width:100%;padding:.7rem .9rem;font-size:1rem;border:1px solid var(--border);
border-radius:10px;background:var(--bg);color:var(--text);margin:.9rem 0 .7rem}
#lock .err{color:#d05a5a;font-size:.9rem;min-height:1.3rem;margin-top:.5rem}
#content{display:none}
</style>
</head>
<body>
<div id="lock">
  <div style="color:var(--accent);font-size:.8rem;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;margin-bottom:.6rem">Upskill Academy · Student Hub</div>
  <h1 style="font-size:1.4rem">Course dashboard</h1>
  <p style="color:var(--muted);margin-top:.6rem">Enter the access code from the

  <input id="pw" type="password" placeholder="Access code" autocomplete="off">
  <br><button class="btn" onclick="unlock()">Unlock</button>
  <div class="err" id="err"></div>
</div>

const b2u = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryDecrypt(pass) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass),
    "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b2u(SALT), iterations:ITER, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b2u(IV)}, key, b2u(CT));
  return new TextDecoder().decode(plain);
}
async function unlock() {
  const pass = document.getElementById("pw").value.trim();
  if (!pass) return;
  document.getElementById("err").textContent = "";
  try {
    const html = await tryDecrypt(pass);
    sessionStorage.setItem("hub_pass", pass);
    document.getElementById("lock").style.display = "none";
    (h => { const f = document.createElement('iframe');f.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0';f.srcdoc = h; document.body.appendChild(f); })(html);
  } catch (e) {
    document.getElementById("err").textContent =
      "That code didn't work — check the Course Resources lecture.";
  }
}
document.getElementById("pw").addEventListener("keydown",
  e => { if (e.key === "Enter") unlock(); });
const saved = sessionStorage.getItem("hub_pass");
if (saved) { document.getElementById("pw").value = saved; unlock(); }
</script>
